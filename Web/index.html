<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>PoI SLAM</title>

  <script>
    window.Module = {
      onRuntimeInitialized() {
        console.log("WASM initialized");
        window._wasmReady = true;
      }
    };
  </script>

  <script src="poi.js?v=2001"></script>

  <style>
    body { 
      margin: 0; 
      padding: 0;
      overflow: hidden; 
      background: #000; 
    }
    #view { 
      position: absolute; 
      top: 0; 
      left: 0; 
      width: 100vw; 
      height: 100vh; 
      display: block;
      object-fit: contain;
    }
    #flip-btn {
      display: none; /* 初期状態は非表示 */
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      padding: 18px 36px;
      background: rgba(255, 255, 255, 0.8);
      border: none;
      color: #000;
      border-radius: 40px;
      font-size: 18px;
      font-weight: bold;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      z-index: 100;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    #flip-btn:active {
      transform: translateX(-50%) scale(0.95);
      background: #fff;
    }
  </style>
</head>
<body>

<button id="flip-btn">Switch Camera</button>
<video id="cam" autoplay playsinline style="display:none"></video>
<canvas id="view"></canvas>

<script src="app.js?v=2"></script>

</body>
</html>
